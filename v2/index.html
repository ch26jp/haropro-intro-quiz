<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>ハロプロ 頭文字あてクイズ（β）</title>
<style>
  :root{ --bg:#150c20; --panel:#241636; --text:#fff; --sub:#c9b6d6; --main:#e4007f; }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% 0%, #3a1f50, var(--bg));
    color:var(--text); min-height:100vh;
    padding:max(20px,env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom));
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:560px;margin:0 auto;}
  .topnav{margin-bottom:6px;}
  .backlink{color:var(--sub);text-decoration:none;font-size:.82rem;background:rgba(255,255,255,.06);padding:7px 12px;border-radius:999px;}
  h1{text-align:center;font-size:1.45rem;margin:8px 0 2px;line-height:1.3;}
  .beta{font-size:.6em;background:var(--main);color:#fff;border-radius:6px;padding:1px 7px;vertical-align:middle;}
  .lead{text-align:center;color:var(--sub);font-size:.85rem;margin-bottom:24px;line-height:1.7;}
  .cards{display:flex;flex-direction:column;gap:14px;}
  .card{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--text);background:var(--panel);border-radius:18px;padding:20px 18px;border:2px solid transparent;box-shadow:0 6px 20px rgba(0,0,0,.35);transition:transform .08s;}
  .card:active{transform:scale(.98);}
  .card .ic{width:54px;height:54px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:bold;color:#fff;}
  .card .tx{flex:1;min-width:0;}
  .card .nm{font-size:1.15rem;font-weight:bold;}
  .card .ds{font-size:.78rem;color:var(--sub);margin-top:3px;}
  .card .go{color:var(--sub);font-size:1.3rem;}
  .footer{text-align:center;color:var(--sub);font-size:.72rem;margin-top:26px;line-height:1.7;}
  .footer a{color:#9ad;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topnav"><a class="backlink" href="../index.html">← 通常版（選んで答える）へ</a></div>
  <h1>🔤 ハロプロ<br>頭文字あてクイズ <span class="beta">β</span></h1>
  <div class="lead">流れた曲名を、頭文字から1文字ずつ当てる新方式！<br>最初の数文字を全部当てれば正解</div>

  <div class="cards" id="cards"></div>

  <div class="footer">
    これは試験版（β）です。通常版とは別に遊べます。<br>
    非公式・非営利。再生は <a href="https://www.spotify.com/" target="_blank" rel="noopener">Spotify</a> 公式プレーヤーを利用。権利は各権利者に帰属します。
  </div>
</div>

<script>
  const GROUPS = [
    { key:"all", name:"🌈 全グループシャッフル", color:"linear-gradient(135deg,#e60026,#EA851A,#F0CC16,#2bb673,#0079c1,#7e3eb1,#d81b60)", desc:"OG含む全11グループから出題！" },
    { key:"mix", name:"🎲 現役グループシャッフル", color:"linear-gradient(135deg,#e60026,#EA851A,#2bb673,#0079c1,#7e3eb1)", desc:"現役7グループから出題！" },
    { key:"mm", name:"モーニング娘。",        color:"#e60026", desc:"代表曲〜最新まで網羅" },
    { key:"ag", name:"アンジュルム",          color:"#0079c1", desc:"改名後（ANGERME）の楽曲" },
    { key:"jj", name:"Juice=Juice",        color:"#7e3eb1", desc:"デビュー曲〜最新まで" },
    { key:"tf", name:"つばきファクトリー",     color:"#f15a9c", desc:"デビュー曲〜最新まで" },
    { key:"by", name:"BEYOOOOONDS",        color:"#2bb673", desc:"デビュー曲〜最新まで" },
    { key:"on", name:"OCHA NORMA",         color:"#EA851A", desc:"デビュー曲〜最新まで" },
    { key:"rc", name:"ロージークロニクル",     color:"#F0CC16", desc:"デビュー曲〜最新まで" },
    { key:"cu", name:"℃-ute",              color:"#d81b60", desc:"OG・代表曲を網羅" },
    { key:"bz", name:"Berryz工房",          color:"#00bcd4", desc:"OG・代表曲を網羅" },
    { key:"cg", name:"カントリー・ガールズ",   color:"#c0883e", desc:"OG・代表曲を網羅" },
    { key:"kf", name:"こぶしファクトリー",     color:"#3f51b5", desc:"OG・代表曲を網羅" },
  ];
  const box = document.getElementById("cards");
  GROUPS.forEach(g=>{
    const a = document.createElement("a");
    a.className = "card";
    a.href = "quiz.html?group=" + g.key;
    a.innerHTML =
      '<div class="ic" style="background:'+g.color+'">🔤</div>'+
      '<div class="tx"><div class="nm">'+g.name+'</div><div class="ds">'+g.desc+'</div></div>'+
      '<div class="go">▶</div>';
    box.appendChild(a);
  });
</script>
</body>
</html>
